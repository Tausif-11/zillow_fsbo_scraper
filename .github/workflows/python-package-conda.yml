name: Zillow Scraper Pipeline CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flake8  # Code lint checking tool

    - name: Run Syntax & Anti-Pattern Check
      run: |
        # Stop the pipeline execution instantly if there are python compilation or syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Execute Automated Data Pipeline Unit Tests
      run: |
        # Verifies extraction, split-routing rules, and pandas transformation math stay working
        python -m unittest test_pipeline.py
